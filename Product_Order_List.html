<html lang="de">

<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
:root{--blue:#1a3a7a;--blue-dark:#0d1b4a;--gold:#c9a84c;--green:#27ae60;--red:#c0392b;--bg:#f4f5f7;--card:#fff;--border:#e2e5ea;--text:#1a1a1a;--muted:#6b7280}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;padding:1.25rem 2rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.3);display:flex;justify-content:space-between;align-items:center}
.header-left h1{font-size:1.4rem;font-weight:800;margin-bottom:.15rem}
.header-left p{opacity:.7;font-size:.82rem}
.header-right{display:flex;gap:1rem;align-items:center}
.lang-toggle{display:flex;gap:.5rem;background:rgba(255,255,255,.15);padding:.35rem .5rem;border-radius:8px}
.lang-btn{background:transparent;border:none;color:#fff;cursor:pointer;font-weight:600;font-size:.85rem;padding:.25rem .45rem;border-radius:4px;transition:all .15s;font-family:inherit}
.lang-btn.active{background:rgba(255,255,255,.3)}
.user-badge{background:rgba(255,255,255,.2);padding:.5rem 1rem;border-radius:8px;font-size:.85rem;font-weight:600}

/* Supplier Tabs */
.supplier-tabs{display:flex;gap:0;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:64px;z-index:95;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sup-tab{padding:.7rem 1.25rem;font-size:.82rem;font-weight:700;cursor:pointer;border:none;background:transparent;font-family:inherit;white-space:nowrap;transition:all .15s;border-bottom:3px solid transparent;color:var(--muted);display:flex;align-items:center;gap:.5rem}
.sup-tab:hover{background:#f0f4ff;color:var(--blue)}
.sup-tab.active{color:var(--blue);border-bottom-color:var(--blue);background:#eef2ff}
.sup-tab .tab-count{background:#e2e5ea;color:var(--muted);padding:.1rem .45rem;border-radius:10px;font-size:.7rem;font-weight:600}
.sup-tab.active .tab-count{background:var(--blue);color:#fff}
.sup-tab.has-items .tab-count{background:var(--gold);color:#fff}
.sup-tab .done-check{color:var(--green);font-size:1rem;margin-left:.15rem}
.sup-tab-all{color:var(--blue-dark)}

/* Toolbar */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:.6rem 1.5rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;position:sticky;top:116px;z-index:90}
.toolbar input[type=text]{flex:1;min-width:180px;padding:.45rem .75rem;border:1px solid var(--border);border-radius:8px;font-size:.87rem;font-family:inherit}
.toolbar select{padding:.45rem .75rem;border:1px solid var(--border);border-radius:8px;font-size:.83rem;font-family:inherit;background:#fff}
.btn{padding:.45rem .9rem;border:none;border-radius:8px;font-family:inherit;font-weight:600;font-size:.83rem;cursor:pointer;transition:all .15s}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#b8943f}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#219a52}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#a93226}
.btn-outline{background:transparent;border:2px solid var(--blue);color:var(--blue)}.btn-outline:hover{background:var(--blue);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Stats bar */
.stats{display:flex;gap:1.5rem;padding:.6rem 1.5rem;background:#eef2ff;border-bottom:1px solid #d4daf0;font-size:.83rem;font-weight:600;flex-wrap:wrap}
.stats span{color:var(--muted)}.stats strong{color:var(--blue)}

/* Supplier order header */
.supplier-header{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;padding:1rem 1.5rem;margin:1rem 1rem 0;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center}
.supplier-header h2{font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:.5rem}
.supplier-header .sup-stats{font-size:.85rem;opacity:.85}
.supplier-actions{display:flex;gap:.5rem;align-items:center}
.btn-order{background:#fff;color:#1e40af;padding:.5rem 1.25rem;border-radius:8px;font-weight:700;font-size:.9rem;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:.4rem;transition:all .15s}
.btn-order:hover{background:#dbeafe;transform:scale(1.02)}

/* Product Table */
.products-table{border-spacing:0;width:100%;margin:0 1rem 1rem;background:#fff;border-radius:0 0 12px 12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.products-table thead{background:#f3f4f6;font-weight:700;font-size:.8rem;color:var(--muted)}
.products-table th{padding:.65rem;text-align:left;border-bottom:1px solid var(--border)}
.products-table td{padding:.65rem;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.products-table tbody tr:hover{background:#fafbfc}
.products-table input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--blue)}
.products-table input[type=number]{width:60px;padding:.35rem;border:1px solid var(--border);border-radius:6px;font-size:.8rem;font-family:inherit;text-align:center}
.product-name{font-weight:600;color:var(--text);font-size:.9rem}
.supplier-badge{background:#eef2ff;color:var(--blue);padding:.25rem .6rem;border-radius:6px;font-size:.75rem;font-weight:600;white-space:nowrap}
.price{font-weight:600;color:var(--blue);font-size:.87rem}

/* Order Panel */
.order-panel{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 20px rgba(0,0,0,.3);z-index:80}
.order-panel .stats-info{display:flex;gap:2rem;font-weight:600}
.order-panel .stats-info span{opacity:.85;font-size:.9rem}
.order-panel .stats-info strong{font-size:1.1rem}
.order-panel .actions{display:flex;gap:.8rem}

/* Login Modal */
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.login-modal{background:#fff;padding:2.5rem;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:400px;width:90%}
.login-modal h2{font-size:1.3rem;font-weight:800;margin-bottom:.2rem;color:var(--blue-dark)}
.login-modal p{color:var(--muted);font-size:.87rem;margin-bottom:1.5rem}
.login-modal input{width:100%;padding:.65rem .8rem;margin-bottom:1rem;border:1px solid var(--border);border-radius:8px;font-size:.87rem;font-family:inherit}
.login-modal .btn{width:100%;margin-top:.5rem;font-weight:700}

/* Toast */
.toast{position:fixed;top:2rem;right:2rem;background:var(--green);color:#fff;padding:1rem 1.5rem;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:1001;font-size:.9rem;font-weight:600}
.toast.error{background:var(--red)}
.toast.info{background:var(--blue)}

/* Utilities */
.no-scroll{overflow:hidden}
.hidden{display:none!important}
.text-center{text-align:center}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@media(max-width:768px){
  .header{flex-direction:column;gap:1rem;align-items:flex-start}
  .header-left{width:100%}
  .header-right{width:100%;justify-content:space-between}
  .order-panel{flex-direction:column;gap:1rem;align-items:stretch}
  .order-panel .actions{justify-content:stretch}
  .order-panel .actions .btn{flex:1}
  .toolbar{padding:.5rem 1rem}
  .toolbar input[type=text]{min-width:140px}
  .products-table{font-size:.75rem}
  .products-table td,.products-table th{padding:.4rem}
  .products-table input[type=number]{width:50px}
}
</style>

<div class="login-overlay" id="loginOverlay">

    <h2>Spudz Bestellungen</h2>

    <input type="password" id="passwordInput" placeholder="Passwort">
    <button class="btn btn-blue" onclick="handleLogin()" style="background:var(--blue);color:#fff;width:100%;">Anmelden</button>
  </div>
</div>

<div id="mainContent" class="hidden">
  <div class="header">

    </div>
  </div>

  <div class="supplier-tabs" id="supplierTabs"></div>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Produkt suchen..." onkeyup="handleSearch()">
    <select id="categoryFilter" onchange="handleCategoryFilter()">
      <option value="">Alle Kategorien</option>
    </select>
    <button class="btn btn-outline" onclick="clearSelection()" id="clearBtn">Alle löschen</button>
  </div>

  <div class="stats" id="statsBar"></div>
  <div id="productsContainer"></div>
</div>

<div class="order-panel hidden" id="orderPanel">
  <div class="stats-info">
    <div><span id="selectedLabel">Artikel:</span> <strong id="selectedCount">0</strong></div>
    <div><span id="totalNetLabel">Netto:</span> <strong id="totalNet">€0.00</strong></div>
    <div><span id="totalGrossLabel">Brutto:</span> <strong id="totalGross">€0.00</strong></div>

  <div class="actions">

  </div>

// ============= Helper Functions =============
function getProductName(product) {
  return currentLang === 'en' ? product.name : product.name_de;
}

function getProductCategory(product) {
  return currentLang === 'en' ? product.cat : product.cat_de;
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('spudz_lang', lang);
  document.getElementById('langDE').classList.toggle('active', lang === 'de');
  document.getElementById('langEN').classList.toggle('active', lang === 'en');
  updateUIText();
  renderAll();
}

function updateUIText() {
  document.getElementById('headerDesc').textContent = t('headerDesc');
  document.getElementById('searchInput').placeholder = t('searchPlaceholder');
  document.getElementById('categoryFilter').options[0].textContent = t('categoryPlaceholder');
  document.getElementById('clearBtn').textContent = t('clearBtn');
  document.getElementById('pdfBtn').textContent = t('pdfBtn');
  document.getElementById('whatsappBtn').textContent = t('whatsappBtn');
  document.getElementById('shareBtn').textContent = t('shareBtn');
  document.getElementById('selectedLabel').textContent = t('selectLabel');
  document.getElementById('totalNetLabel').textContent = t('totalNetLabel');
  document.getElementById('totalGrossLabel').textContent = t('totalGrossLabel');
}

function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function handleLogin() {
  const email = document.getElementById('emailInput').value.toLowerCase();
  const password = document.getElementById('passwordInput').value;
  const user = USERS.find(u => u.email === email && u.password === password);
  if (user) {
    currentUser = user;
    localStorage.setItem('spudz_user', email);
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('userBadge').textContent = user.name;
    renderAll();
  } else {
    showToast('Ungültige Anmeldedaten', 'error');
  }
}

function getSuppliers() {
  const suppliers = new Set(PRODUCTS.map(p => p.supplier));
  return Array.from(suppliers).sort();
}

function getCategories() {
  if (currentLang === 'en') {
    return [...new Set(PRODUCTS.map(p => p.cat))].sort();
  } else {
    return [...new Set(PRODUCTS.map(p => p.cat_de))].sort();
  }
}

function getProductsBySupplier(supplier) {
  if (supplier === 'all') return PRODUCTS;
  return PRODUCTS.filter(p => p.supplier === supplier);
}

function getProductsByFilter() {
  const products = getProductsBySupplier(currentSupplier);
  return products.filter(p => {
    const matchesSearch = !filterText || p.name.toLowerCase().includes(filterText.toLowerCase()) || p.name_de.toLowerCase().includes(filterText.toLowerCase());
    const matchesCategory = !currentCategory || getProductCategory(p) === currentCategory;
    return matchesSearch && matchesCategory;
  });
}

function handleSearch() {
  filterText = document.getElementById('searchInput').value.trim();
  renderProducts();
}

function handleCategoryFilter() {
  currentCategory = document.getElementById('categoryFilter').value;
  renderProducts();
}

function handleSupplierTab(supplier) {
  currentSupplier = supplier;
  renderAll();
}

function toggleProduct(nr) {
  if (!cart[nr]) cart[nr] = 1;
  else delete cart[nr];
  saveCart();
  renderAll();
}

function updateQuantity(nr, qty) {
  const q = parseInt(qty) || 0;
  if (q > 0) cart[nr] = q;
  else delete cart[nr];
  saveCart();
  updateStats();
}

function saveCart() {
  localStorage.setItem('spudz_cart', JSON.stringify(cart));
}

function clearSelection() {
  cart = {};
  saveCart();
  renderAll();
}

function getSelectedProducts() {
  return Object.keys(cart).map(nr => {
    const product = PRODUCTS.find(p => p.nr === nr);
    return {...product, quantity: cart[nr]};
  });
}

function calculateTotals() {
  const selected = getSelectedProducts();
  const totalNet = selected.reduce((sum, p) => sum + parseFloat(p.price_net) * p.quantity, 0);
  const totalGross = selected.reduce((sum, p) => sum + parseFloat(p.price_gross) * p.quantity, 0);
  return {count: selected.length, totalNet, totalGross};
}

function updateStats() {
  const {count, totalNet, totalGross} = calculateTotals();
  document.getElementById('selectedCount').textContent = count;
  document.getElementById('totalNet').textContent = '€' + totalNet.toFixed(2);
  document.getElementById('totalGross').textContent = '€' + totalGross.toFixed(2);
  document.getElementById('orderPanel').classList.toggle('hidden', count === 0);
}

function renderSupplierTabs() {
  const suppliers = getSuppliers();
  const html = ['all', ...suppliers].map(sup => {
    const products = getProductsBySupplier(sup);
    const count = products.length;
    const supName = sup === 'all' ? t('allSuppliers') : sup;
    const isActive = currentSupplier === sup ? 'active' : '';
    return `<button class="sup-tab ${isActive}" onclick="handleSupplierTab('${sup}')">
      ${supName} <span class="tab-count">${count}</span>
    </button>`;
  }).join('');
  document.getElementById('supplierTabs').innerHTML = html;
}

function renderCategoryFilter() {
  const categories = getCategories();
  const select = document.getElementById('categoryFilter');
  const currentVal = select.value;
  select.innerHTML = `<option value="">${t('categoryPlaceholder')}</option>` +
    categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
  select.value = currentVal;
}

function renderProducts() {
  const products = getProductsByFilter();
  const suppliers = new Set(products.map(p => p.supplier));
  const html = Array.from(suppliers).sort().map(supplier => {
    const supProducts = products.filter(p => p.supplier === supplier);
    const rows = supProducts.map(p => {
      const checked = cart[p.nr] ? 'checked' : '';
      const qty = cart[p.nr] || '';
      const netTotal = parseFloat(p.price_net) * (cart[p.nr] || 0);
      return `<tr>
        <td><input type="checkbox" ${checked} onchange="toggleProduct('${p.nr}')"></td>
        <td class="product-name" style="font-size:.8rem">${p.nr}</td>
        <td class="product-name">${getProductName(p)}</td>
        <td><span class="supplier-badge">${p.supplier}</span></td>
        <td style="font-size:.8rem">${p.unit}</td>
        <td class="price" style="font-size:.85rem">€${p.price_net}</td>
        <td class="price" style="font-size:.85rem">€${p.price_gross}</td>
        <td><input type="number" value="${qty}" onchange="updateQuantity('${p.nr}', this.value)" placeholder="0"></td>
        <td class="price" style="font-size:.85rem">€${netTotal.toFixed(2)}</td>
      </tr>`;
    }).join('');
    return `<div class="supplier-header">
      <h2>${supplier} <span class="sup-stats">${supProducts.length} ${currentLang === 'en' ? 'products' : 'Produkte'}</span></h2>
    </div>
    <table class="products-table">
      <thead><tr>
        <th></th>
        <th style="font-size:.75rem">Nr</th>
        <th>${currentLang === 'en' ? 'Product' : 'Produkt'}</th>
        <th>Supplier</th>
        <th>${currentLang === 'en' ? 'Unit' : 'Einheit'}</th>
        <th>${currentLang === 'en' ? 'Net' : 'Netto'}</th>
        <th>${currentLang === 'en' ? 'Gross' : 'Brutto'}</th>
        <th>${currentLang === 'en' ? 'Qty' : 'Menge'}</th>
        <th>${currentLang === 'en' ? 'Total' : 'Summe'}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }).join('');
  document.getElementById('productsContainer').innerHTML = html || `<p style="padding:2rem;text-align:center">${currentLang === 'en' ? 'No products found' : 'Keine Produkte gefunden'}</p>`;
}

function renderAll() {
  renderSupplierTabs();
  renderCategoryFilter();
  renderProducts();
  updateStats();
}

function exportPDF() {
  const selected = getSelectedProducts();
  if (selected.length === 0) {
    showToast(t('nothingSelected'), 'error');
    return;
  }
  const {totalNet, totalGross} = calculateTotals();
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text(t('pdfTitle'), 10, 10);
  doc.setFontSize(10);
  doc.text(t('pdfDate') + ' ' + new Date().toLocaleDateString(), 10, 20);
  doc.text(t('pdfUser') + ' ' + currentUser.name, 10, 27);

  const groupedBySupplier = {};
  selected.forEach(p => {
    if (!groupedBySupplier[p.supplier]) groupedBySupplier[p.supplier] = [];
    groupedBySupplier[p.supplier].push(p);
  });

  let yPos = 35;
  Object.keys(groupedBySupplier).sort().forEach(supplier => {
    doc.setFontSize(11);
    doc.text(t('pdfSupplier') + ': ' + supplier, 10, yPos);
    yPos += 7;

    const rows = groupedBySupplier[supplier].map(p => [
      p.nr,
      getProductName(p),
      getProductCategory(p),
      p.unit,
      '€' + p.price_net,
      p.quantity.toString(),
      '€' + (parseFloat(p.price_net) * p.quantity).toFixed(2)
    ]);

    doc.autoTable({
      startY: yPos,
      head: [[t('pdfProductNr'), t('pdfProductName'), t('pdfCategory'), t('pdfUnit'), t('pdfNetPrice'), t('pdfQuantity'), t('pdfTotal')]],
      body: rows,
      headStyles: {fillColor: [26, 58, 122], textColor: 255, fontSize: 8},
      bodyStyles: {fontSize: 8},
      margin: 10,
      didDrawPage: () => {}
    });
    yPos = doc.lastAutoTable.finalY + 10;
  });

  doc.setFontSize(10);
  doc.text(t('pdfNetTotal') + ' €' + totalNet.toFixed(2), 10, yPos + 5);
  doc.text(t('pdfGrossTotal') + ' €' + totalGross.toFixed(2), 10, yPos + 12);

  doc.save(`Bestellung_${new Date().toLocaleDateString('de-DE')}.pdf`);
  showToast(t('toastPdfGenerated'));
}

function shareWhatsApp() {
  const selected = getSelectedProducts();
  if (selected.length === 0) {
    showToast(t('nothingSelected'), 'error');
    return;
  }
  const {totalNet, totalGross} = calculateTotals();
  let text = `Spudz Bestellung von ${currentUser.name}\n\n`;
  const groupedBySupplier = {};
  selected.forEach(p => {
    if (!groupedBySupplier[p.supplier]) groupedBySupplier[p.supplier] = [];
    groupedBySupplier[p.supplier].push(p);
  });
  Object.keys(groupedBySupplier).sort().forEach(supplier => {
    text += `*${supplier}*\n`;
    groupedBySupplier[supplier].forEach(p => {
      text += `${getProductName(p)} x${p.quantity} (€${(parseFloat(p.price_net) * p.quantity).toFixed(2)})\n`;
    });
    text += '\n';
  });
  text += `Netto: €${totalNet.toFixed(2)}\nBrutto: €${totalGross.toFixed(2)}`;
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

function shareWeb() {
  const selected = getSelectedProducts();
  if (selected.length === 0) {
    showToast(t('nothingSelected'), 'error');
    return;
  }
  const {totalNet, totalGross} = calculateTotals();
  if (navigator.share) {
    navigator.share({
      title: 'Spudz Bestellung',
      text: `Bestellung vom ${new Date().toLocaleDateString()}\nNetto: €${totalNet.toFixed(2)}\nBrutto: €${totalGross.toFixed(2)}`
    });
  } else {
    showToast(t('toastShareError'), 'error');
  }
}

// ============= Init =============
window.addEventListener('DOMContentLoaded', () => {
  const savedUser = localStorage.getItem('spudz_user');
  if (savedUser) {
    const user = USERS.find(u => u.email === savedUser);
    if (user) {
      currentUser = user;
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      document.getElementById('userBadge').textContent = user.name;
      renderAll();
    }
  }
  setLang(currentLang);
});
