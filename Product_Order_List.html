<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spudz — Bestellungen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
:root{--blue:#1a3a7a;--blue-dark:#0d1b4a;--gold:#c9a84c;--green:#27ae60;--red:#c0392b;--bg:#f4f5f7;--card:#fff;--border:#e2e5ea;--text:#1a1a1a;--muted:#6b7280}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;padding:1.25rem 2rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.header h1{font-size:1.4rem;font-weight:800;margin-bottom:.15rem}
.header p{opacity:.7;font-size:.82rem}

/* Supplier Tabs */
.supplier-tabs{display:flex;gap:0;overflow-x:auto;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:64px;z-index:95;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sup-tab{padding:.7rem 1.25rem;font-size:.82rem;font-weight:700;cursor:pointer;border:none;background:transparent;font-family:inherit;white-space:nowrap;transition:all .15s;border-bottom:3px solid transparent;color:var(--muted);display:flex;align-items:center;gap:.5rem}
.sup-tab:hover{background:#f0f4ff;color:var(--blue)}
.sup-tab.active{color:var(--blue);border-bottom-color:var(--blue);background:#eef2ff}
.sup-tab .tab-count{background:#e2e5ea;color:var(--muted);padding:.1rem .45rem;border-radius:10px;font-size:.7rem;font-weight:600}
.sup-tab.active .tab-count{background:var(--blue);color:#fff}
.sup-tab.has-items .tab-count{background:var(--gold);color:#fff}
.sup-tab .done-check{color:var(--green);font-size:1rem;margin-left:.15rem}
.sup-tab-all{color:var(--blue-dark)}

/* Toolbar */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:.6rem 1.5rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;position:sticky;top:116px;z-index:90}
.toolbar input[type=text]{flex:1;min-width:180px;padding:.45rem .75rem;border:1px solid var(--border);border-radius:8px;font-size:.87rem;font-family:inherit}
.toolbar select{padding:.45rem .75rem;border:1px solid var(--border);border-radius:8px;font-size:.83rem;font-family:inherit;background:#fff}
.btn{padding:.45rem .9rem;border:none;border-radius:8px;font-family:inherit;font-weight:600;font-size:.83rem;cursor:pointer;transition:all .15s}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#b8943f}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#219a52}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#a93226}
.btn-outline{background:transparent;border:2px solid var(--blue);color:var(--blue)}.btn-outline:hover{background:var(--blue);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Stats bar */
.stats{display:flex;gap:1.5rem;padding:.6rem 1.5rem;background:#eef2ff;border-bottom:1px solid #d4daf0;font-size:.83rem;font-weight:600;flex-wrap:wrap}
.stats span{color:var(--muted)}.stats strong{color:var(--blue)}

/* Supplier order header */
.supplier-header{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;padding:1rem 1.5rem;margin:1rem 1rem 0;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center}
.supplier-header h2{font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:.5rem}
.supplier-header .sup-stats{font-size:.85rem;opacity:.85}
.supplier-actions{display:flex;gap:.5rem;align-items:center}
.btn-order{background:#fff;color:#1e40af;padding:.5rem 1.25rem;border-radius:8px;font-weight:700;font-size:.9rem;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:.4rem;transition:all .15s}
.btn-order:hover{background:#dbeafe;transform:scale(1.02)}
.btn-order:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Container */
.container{max-width:1400px;margin:0 auto;padding:0 1rem 1rem}
.category-group{margin-bottom:1rem}
.category-header{background:var(--blue-dark);color:#fff;padding:.55rem 1.25rem;border-radius:10px 10px 0 0;font-weight:700;font-size:.9rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.category-header:hover{background:var(--blue)}
.category-header .count{background:rgba(255,255,255,.2);padding:.1rem .45rem;border-radius:12px;font-size:.72rem}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:0 0 10px 10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
th{background:#f8f9fb;padding:.5rem .65rem;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:.45rem .65rem;border-bottom:1px solid #f0f1f4;font-size:.83rem;vertical-align:middle}
tr:hover td{background:#f8faff}
tr.selected td{background:#eef7ee}
.supplier-tag{display:inline-block;padding:.12rem .45rem;border-radius:4px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.tag-metro{background:#e3f2fd;color:#1565c0}
.tag-arfiyato{background:#fce4ec;color:#c62828}
.tag-arla{background:#e8f5e9;color:#2e7d32}
.tag-lions{background:#fff3e0;color:#e65100}
.tag-vanbeekum{background:#f3e5f5;color:#6a1b9a}
.tag-foodkings{background:#fff8e1;color:#f57f17}
.tag-ecolife{background:#e0f2f1;color:#00695c}
.tag-bade{background:#fafafa;color:#424242}
.tag-transgourmet{background:#efebe9;color:#4e342e}
.tag-amazon{background:#FF9900;color:#111}
.tag-selim{background:#ffebee;color:#b71c1c}
.tag-gambert{background:#e8eaf6;color:#283593}
.tag-asiamoin{background:#e0f7fa;color:#006064}
.tag-plastikbecher{background:#fbe9e7;color:#bf360c}


.qty-input{width:58px;padding:.25rem .35rem;border:1px solid var(--border);border-radius:6px;text-align:center;font-family:inherit;font-size:.83rem}
.qty-input:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 2px rgba(26,58,122,.15)}
.check-cell{width:34px;text-align:center}
.check-cell input{width:17px;height:17px;cursor:pointer;accent-color:var(--green)}
.price{font-weight:600;white-space:nowrap}

/* Order panel (bottom bar) */
.order-panel{position:fixed;bottom:0;left:0;right:0;background:var(--blue-dark);color:#fff;padding:.75rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:100;transform:translateY(100%);transition:transform .3s;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.order-panel.visible{transform:translateY(0)}
.order-panel .info{font-size:.85rem}.order-panel .total{font-size:1.2rem;font-weight:800;color:var(--gold)}
.order-panel .actions{display:flex;gap:.5rem}

/* Done overlay */
.done-overlay{background:#f0fdf4;border:2px solid var(--green);border-radius:12px;padding:1.5rem;margin:1rem;text-align:center}
.done-overlay h3{color:var(--green);font-size:1.1rem;margin-bottom:.25rem}
.done-overlay p{color:var(--muted);font-size:.85rem}
.done-overlay button{margin-top:.75rem}

/* Toast */
.toast{position:fixed;top:80px;right:1.5rem;background:var(--green);color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-weight:600;font-size:.9rem;z-index:999;box-shadow:0 4px 15px rgba(0,0,0,.2);transform:translateX(120%);transition:transform .3s}
.toast.show{transform:translateX(0)}

.hidden{display:none}
@media(max-width:768px){
.toolbar{flex-direction:column}.toolbar input[type=text]{width:100%}
.stats{flex-wrap:wrap;gap:.5rem}
td,th{padding:.35rem .4rem;font-size:.78rem}
.qty-input{width:48px}
.supplier-tabs{gap:0}
.sup-tab{padding:.6rem .8rem;font-size:.75rem}
.supplier-header{flex-direction:column;gap:.5rem;text-align:center}
}
@media print{
.toolbar,.header,.order-panel,.no-print,.supplier-tabs{display:none!important}
body{background:#fff;padding:0}table{box-shadow:none}
.category-header{background:#333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.supplier-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* Login Screen */
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--blue-dark),var(--blue));display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:#fff;border-radius:16px;padding:2.5rem;width:90%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-card h2{text-align:center;color:var(--blue-dark);font-size:1.5rem;margin-bottom:.25rem}
.login-card .subtitle{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}
.login-card label{display:block;font-weight:600;font-size:.85rem;margin-bottom:.3rem;color:var(--text)}
.login-card input{width:100%;padding:.65rem .85rem;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:.95rem;margin-bottom:1rem;transition:border-color .2s}
.login-card input:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px rgba(26,58,122,.12)}
.login-btn{width:100%;padding:.75rem;background:var(--gold);color:#fff;border:none;border-radius:10px;font-family:inherit;font-weight:800;font-size:1rem;cursor:pointer;transition:all .15s}
.login-btn:hover{background:#b8943f;transform:scale(1.02)}
.login-error{color:var(--red);font-size:.83rem;text-align:center;margin-bottom:.75rem;min-height:1.2rem;font-weight:600}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.user-badge{display:flex;align-items:center;gap:.5rem;font-size:.82rem;margin-top:.4rem}
.user-badge .name{font-weight:700;color:#fff}
.user-badge .role-tag{background:rgba(255,255,255,.2);padding:.1rem .5rem;border-radius:6px;font-size:.72rem;font-weight:600}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.25rem .6rem;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.logout-btn:hover{background:rgba(255,255,255,.3)}
.app-content.hidden-app{display:none}
.lang-btn.active{background:rgba(255,255,255,.35)!important;border-color:#fff!important}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>🥔 Spudz</h2>
    <div class="subtitle">Bestellsystem — Bitte anmelden</div>
    <div class="login-error" id="loginError"></div>
    <label>Benutzername</label>
    <input type="text" id="loginUser" placeholder="z.B. emre" autocomplete="username" autofocus>
    <label>Passwort</label>
    <input type="password" id="loginPass" placeholder="Passwort" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Anmelden</button>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div class="app-content hidden-app" id="appContent">
<div class="header">
<div style="display:flex;justify-content:space-between;align-items:flex-start">
  <div>
    <h1>Spudz — Bestellungen</h1>
    <p>1. Lager waehlen &rarr; 2. Lieferant &rarr; 3. Mengen eingeben &rarr; 4. An Seval senden</p>
  </div>
  <div style="display:flex;gap:4px;align-items:center">
    <button class="lang-btn" data-lang="de" onclick="setLang('de')" style="padding:2px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.2);color:#fff;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit">🇩🇪 DE</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')" style="padding:2px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit">🇬🇧 EN</button>
  </div>
  <div class="user-badge" id="userBadge">
    <span class="name" id="userDisplay"></span>
    <span class="role-tag" id="userRole"></span>
    <button class="logout-btn" onclick="doLogout()">Abmelden</button>
  </div>
</div>
<div style="margin-top:.5rem;display:flex;align-items:center;gap:.75rem">
  <label style="font-size:.85rem;font-weight:600;opacity:.8">Lager:</label>
  <select id="lagerSelect" onchange="saveLager()" style="padding:.35rem .6rem;border-radius:6px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-family:inherit;font-weight:700;font-size:.9rem;cursor:pointer">
    <option value="" style="color:#333">— Bitte Lager waehlen —</option>
    <option value="Baumholder" style="color:#333">Baumholder</option>
    <option value="KMCC" style="color:#333">KMCC</option>
    <option value="Kleber" style="color:#333">Kleber</option>
    <option value="Spangdahlem" style="color:#333">Spangdahlem</option>
    <option value="Patch" style="color:#333">Patch</option>
    <option value="Stuttgart FT" style="color:#333">Stuttgart FT</option>
    <option value="Ansbach" style="color:#333">Ansbach</option>
    <option value="Grafenwoehr" style="color:#333">Grafenwoehr</option>
    <option value="Landstuhl" style="color:#333">Landstuhl</option>
  </select>
  <span id="lagerWarning" style="color:#ffcc00;font-size:.8rem;font-weight:600;display:none">&#9888; Bitte zuerst Lager auswaehlen!</span>
</div>
</div>

<div class="supplier-tabs" id="supplierTabs"></div>

<div class="toolbar">
<input type="text" id="search" placeholder="Produkt suchen...">
<select id="filterCat"><option value="">Alle Kategorien</option></select>
<select id="showMode"><option value="all">Alle anzeigen</option><option value="selected">Nur Ausgewaehlte</option></select>
<button class="btn btn-outline" onclick="selectAllVisible()">Sichtbare auswaehlen</button>
<button class="btn btn-red" onclick="clearSupplier()">Zuruecksetzen</button>
</div>

<div class="stats" id="statsBar">
<span>Produkte: <strong id="statTotal">0</strong></span>
<span>Ausgewaehlt: <strong id="statSelected">0</strong></span>
<span>Netto: <strong id="statNet">0,00 EUR</strong></span>
<span>Brutto: <strong id="statGross">0,00 EUR</strong></span>
</div>

<div class="container" id="productContainer"></div>

<div class="order-panel" id="orderPanel">
<div class="info"><span id="panelCount">0</span> Artikel ausgewaehlt</div>
<div class="total" id="panelTotal">0,00 EUR</div>
<div class="actions">
<button class="btn btn-gold" onclick="exportAll()">Gesamt-PDF</button>
</div>
</div>

<div class="toast" id="toast"></div>
</div><!-- end app-content -->

<script>
// ===== USER ACCOUNTS =====
const USERS = {
  'can':    {pass:'Spudz!BX2026',   name:'Can',                lager:'Baumholder',   role:'store'},
  'omer':   {pass:'Spudz!OM2026',   name:'Ömer',              lager:'Baumholder',   role:'store'},
  'sertan': {pass:'Spudz!KMCC2026', name:'Sertan Mert Övelek', lager:'KMCC',         role:'store'},
  'zeki':   {pass:'Spudz!KL2026',   name:'Zeki',               lager:'Kleber',       role:'store'},
  'gyokan': {pass:'Spudz!SP2026',   name:'Gyokan Hayrulov',    lager:'Spangdahlem',  role:'store'},
  'emre':   {pass:'Spudz!PA2026',   name:'Emre Can',           lager:'Patch',        role:'store'},
  'serhat': {pass:'Spudz!PA2026b',  name:'Serhat Güler',       lager:'Patch',        role:'store'},
  'enver':  {pass:'Spudz!FT2026',   name:'Enver Yusein',       lager:'Stuttgart FT', role:'store'},
  'emrah':  {pass:'Spudz!AN2026',   name:'Emrah Güler',        lager:'Ansbach',      role:'store'},
  'ugur':   {pass:'Spudz!GR2026',   name:'Ugur Haşhaş',       lager:'Grafenwoehr',  role:'store'},
  'jona':   {pass:'ChefSpudz!2026', name:'Jona',               lager:null,           role:'admin'},
  'seval':  {pass:'SevalSpudz!2026',name:'Seval',              lager:null,           role:'admin'},
  'serkan': {pass:'SerkanSpudz!26', name:'Serkan',             lager:null,           role:'admin'},
  'alisan': {pass:'AlisanSpudz!26', name:'Alişan',            lager:null,           role:'admin'},
  'onder':  {pass:'OnderSpudz!26',  name:'Önder',             lager:null,           role:'admin'}
};


// ===== LANGUAGE =====
let currentLang = 'de';
try { currentLang = localStorage.getItem('spudz_lang') || 'de'; } catch(e) {}
function setLang(lang) {
  currentLang = lang;
  try { localStorage.setItem('spudz_lang', lang); } catch(e) {}
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  if(typeof buildSupplierTabs === 'function') { buildCatFilter(); render(); buildSupplierTabs(); updateStats(); }
}
function pName(p) { return currentLang === 'de' ? (p.name_de || p.name) : p.name; }
function pCat(p) { return currentLang === 'de' ? (p.cat_de || p.cat) : p.cat; }

let currentUser = null; // {username, name, lager, role}

function doLogin(){
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  if(!u||!p){err.textContent='Bitte beide Felder ausfuellen';return;}
  const user = USERS[u];
  if(!user || user.pass !== p){
    err.textContent='Falscher Benutzername oder Passwort';
    document.querySelector('.login-card').classList.add('shake');
    setTimeout(()=>document.querySelector('.login-card').classList.remove('shake'),500);
    return;
  }
  currentUser = {username:u, name:user.name, lager:user.lager, role:user.role};
  try{localStorage.setItem('spudz_session',JSON.stringify(currentUser));}catch(e){}
  activateApp();
}

function doLogout(){
  currentUser = null;
  try{localStorage.removeItem('spudz_session');}catch(e){}
  document.getElementById('appContent').classList.add('hidden-app');
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').textContent='';
}

function activateApp(){
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('appContent').classList.remove('hidden-app');
  // Set user display
  document.getElementById('userDisplay').textContent = currentUser.name;
  document.getElementById('userRole').textContent = currentUser.role==='admin' ? 'Admin' : currentUser.lager;
  // Handle Lager
  const sel = document.getElementById('lagerSelect');
  if(currentUser.role==='store' && currentUser.lager){
    sel.value = currentUser.lager;
    selectedLager = currentUser.lager;
    sel.disabled = true;
    sel.style.opacity = '0.7';
    try{localStorage.setItem('spudz_lager',selectedLager);}catch(e){}
  } else {
    sel.disabled = false;
    sel.style.opacity = '1';
  }
  init();
}

function checkSession(){
  try{
    const s = localStorage.getItem('spudz_session');
    if(s){
      const data = JSON.parse(s);
      if(USERS[data.username]){
        currentUser = data;
        activateApp();
        return;
      }
    }
  }catch(e){}
  // No valid session — show login
  document.getElementById('loginOverlay').style.display='flex';
}

// Enter key on login fields
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
  document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus()});

const supplierColors = {'Metro':'metro','Arfiyato':'arfiyato','Arla Foods':'arla','Lions':'lions','Van Beekum':'vanbeekum','Food-Kings':'foodkings','eco life':'ecolife','BaDe Handels':'bade','Transgourmet':'transgourmet','Amazon':'amazon',"Selim's Döner":'selim','Gastroservice Gambert':'gambert','Asia Moin':'asiamoin','Plastikbecher.de':'plastikbecher'};
let state = {};
let orderedSuppliers = {}; // tracks which suppliers have been ordered
let activeSupplier = ''; // current supplier tab ('' = all)
let selectedLager = ''; // mandatory store selection

function saveLager(){
  selectedLager = document.getElementById('lagerSelect').value;
  try{localStorage.setItem('spudz_lager', selectedLager);}catch(e){}
  document.getElementById('lagerWarning').style.display = selectedLager ? 'none' : 'inline';
}

function requireLager(){
  if(!selectedLager){
    document.getElementById('lagerWarning').style.display = 'inline';
    document.getElementById('lagerSelect').focus();
    showToast('Bitte zuerst ein Lager auswaehlen!');
    return false;
  }
  return true;
}

function init(){
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===currentLang));
  buildCatFilter();


  try{state=JSON.parse(localStorage.getItem('spudz_order')||'{}');}catch(e){state={};}
  try{orderedSuppliers=JSON.parse(localStorage.getItem('spudz_ordered')||'{}');}catch(e){orderedSuppliers={};}
  try{selectedLager=localStorage.getItem('spudz_lager')||'';}catch(e){selectedLager='';}
  if(selectedLager) document.getElementById('lagerSelect').value = selectedLager;

  buildSupplierTabs();
  render();

  document.getElementById('search').addEventListener('input',render);
  document.getElementById('filterCat').addEventListener('change',render);
  document.getElementById('showMode').addEventListener('change',render);
}

function buildCatFilter(){
  const cats=[...new Set(PRODUCTS.map(p=>pCat(p)))].sort();
  const fC=document.getElementById('filterCat');
  const cur=fC.value;
  fC.innerHTML='<option value="">Alle Kategorien</option>';
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fC.appendChild(o)});
  fC.value=cur;
}

function buildSupplierTabs(){
  const suppliers = [...new Set(PRODUCTS.map(p=>p.supplier))].sort();
  const tabs = document.getElementById('supplierTabs');
  tabs.innerHTML = '';

  // "Alle" tab
  const allTab = document.createElement('button');
  allTab.className = 'sup-tab sup-tab-all' + (activeSupplier===''?' active':'');
  const totalSelected = PRODUCTS.filter(p=>state[p.nr]).length;
  allTab.innerHTML = `Alle <span class="tab-count">${PRODUCTS.length}</span>`;
  allTab.onclick = ()=>{activeSupplier='';document.getElementById('filterCat').value='';render();buildSupplierTabs()};
  tabs.appendChild(allTab);

  suppliers.forEach(sup=>{
    const supProducts = PRODUCTS.filter(p=>p.supplier===sup);
    const selCount = supProducts.filter(p=>state[p.nr]).length;
    const btn = document.createElement('button');
    const isActive = activeSupplier===sup;
    const isDone = orderedSuppliers[sup];
    btn.className = 'sup-tab' + (isActive?' active':'') + (selCount>0?' has-items':'');
    btn.innerHTML = `${isDone?'<span class="done-check">&#10003;</span>':''}${sup} <span class="tab-count">${selCount>0?selCount+' / ':''}${supProducts.length}</span>`;
    btn.onclick = ()=>{activeSupplier=sup;document.getElementById('filterCat').value='';render();buildSupplierTabs()};
    tabs.appendChild(btn);
  });
}

function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filterCat').value;
  const mode = document.getElementById('showMode').value;
  return PRODUCTS.filter(p=>{
    if(q && !p.name.toLowerCase().includes(q) && !(p.name_de||'').toLowerCase().includes(q) && !p.nr.toLowerCase().includes(q) && !pCat(p).toLowerCase().includes(q)) return false;
    if(activeSupplier && p.supplier!==activeSupplier) return false;
    if(cat && pCat(p)!==cat) return false;
    if(mode==='selected' && !state[p.nr]) return false;
    return true;
  });
}

function render(){
  const filtered = getFiltered();
  const container = document.getElementById('productContainer');
  container.innerHTML = '';

  // If viewing a specific supplier, show supplier header with order button
  if(activeSupplier){
    const supProducts = PRODUCTS.filter(p=>p.supplier===activeSupplier);
    const selProducts = supProducts.filter(p=>state[p.nr]);
    const totalNet = selProducts.reduce((s,p)=>s+Math.round((parseFloat(p.price_net)||0)*(state[p.nr]?.qty||0)*100)/100,0);
    const totalGross = selProducts.reduce((s,p)=>s+Math.round((parseFloat(p.price_gross)||0)*(state[p.nr]?.qty||0)*100)/100,0);
    const isDone = orderedSuppliers[activeSupplier];

    if(isDone){
      container.innerHTML = `<div class="done-overlay">
        <h3>&#10003; ${activeSupplier} — Gesendet!</h3>
        <p>Bestellung am ${isDone} geteilt. Mengen zurueckgesetzt.</p>
        <button class="btn btn-outline" onclick="undoOrder('${activeSupplier}')">Rueckgaengig</button>
        <button class="btn btn-gold" style="margin-left:.5rem" onclick="reopenSupplier('${activeSupplier}')">Neue Bestellung</button>
      </div>`;
      updateStats(); buildSupplierTabs();
      return;
    }

    const hdr = document.createElement('div');
    hdr.className = 'supplier-header';
    hdr.innerHTML = `
      <div>
        <h2><span class="supplier-tag tag-${supplierColors[activeSupplier]||'metro'}" style="font-size:.8rem;padding:.2rem .6rem">${activeSupplier}</span></h2>
        <div class="sup-stats">${selProducts.length} von ${supProducts.length} ausgewaehlt &mdash; Netto: ${totalNet.toFixed(2)} EUR / Brutto: ${totalGross.toFixed(2)} EUR</div>
      </div>
      <div class="supplier-actions">
        <button class="btn btn-outline" onclick="downloadPDF('${activeSupplier}')" ${selProducts.length===0?'disabled':''} style="font-size:.8rem;padding:.45rem .9rem">PDF</button>
        <button class="btn-order" onclick="placeOrder('${activeSupplier}')" ${selProducts.length===0?'disabled':''}>
          Senden &#10148;
        </button>
      </div>`;
    container.appendChild(hdr);
  }

  // Group by category
  const grouped = {};
  filtered.forEach(p=>{
    const c=pCat(p);
    if(!grouped[c]) grouped[c]=[];
    grouped[c].push(p);
  });

  Object.keys(grouped).sort().forEach(cat=>{
    const items = grouped[cat];
    const div = document.createElement('div');
    div.className = 'category-group';
    div.innerHTML = `
      <div class="category-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <span>${cat}</span>
        <span class="count">${items.length}</span>
      </div>
      <table>
        <thead><tr>
          <th class="check-cell">&#10003;</th>
          <th>Art.Nr</th>
          <th>Produkt</th>
          ${activeSupplier?'':'<th>Lieferant</th>'}
          <th>Einheit</th>
          <th>Netto</th>
          <th>Brutto</th>
          <th>Menge</th>
          <th>Summe</th>
        </tr></thead>
        <tbody>${items.map(p=>{
          const sel = state[p.nr];
          const qty = sel ? sel.qty : '';
          const net = parseFloat(p.price_net)||0;
          const gross = parseFloat(p.price_gross)||0;
          const sub = qty ? (Math.round(gross * parseInt(qty)*100)/100).toFixed(2) : '';
          const tag = supplierColors[p.supplier]||'metro';
          return `<tr class="${sel?'selected':''}" data-nr="${p.nr}">
            <td class="check-cell"><input type="checkbox" ${sel?'checked':''} onchange="toggleProduct('${p.nr}',this.checked)"></td>
            <td style="font-size:.73rem;color:var(--muted)">${p.nr}</td>
            <td style="font-weight:600">${pName(p)}</td>
            ${activeSupplier?'':`<td><span class="supplier-tag tag-${tag}">${p.supplier}</span></td>`}
            <td>${p.unit}</td>
            <td class="price">${net.toFixed(2)} EUR</td>
            <td class="price">${(parseFloat(p.price_gross)||0).toFixed(2)} EUR</td>
            <td><input type="number" class="qty-input" min="0" value="${qty}" placeholder="0" onchange="setQty('${p.nr}',this.value)" onfocus="if(!state['${p.nr}'])toggleProduct('${p.nr}',true);this.closest('tr').querySelector('input[type=checkbox]').checked=true"></td>
            <td class="price" style="color:var(--green)">${sub?sub+' EUR':''}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
    container.appendChild(div);
  });

  if(filtered.length===0 && !orderedSuppliers[activeSupplier]){
    container.innerHTML += '<div style="text-align:center;padding:3rem;color:var(--muted)">Keine Produkte gefunden.</div>';
  }

  updateStats();
  buildSupplierTabs();
}

function toggleProduct(nr, checked){
  if(checked){
    if(!state[nr]) state[nr]={qty:1};
  } else {
    delete state[nr];
  }
  save(); render();
}

function setQty(nr, val){
  const v = parseInt(val)||0;
  if(v>0){
    state[nr]={qty:v};
  } else {
    delete state[nr];
  }
  save(); render();
}

function selectAllVisible(){
  getFiltered().forEach(p=>{if(!state[p.nr])state[p.nr]={qty:1}});
  save(); render();
}

function clearSupplier(){
  if(activeSupplier){
    if(!confirm(`Alle Mengen fuer ${activeSupplier} zuruecksetzen?`)) return;
    PRODUCTS.filter(p=>p.supplier===activeSupplier).forEach(p=>delete state[p.nr]);
  } else {
    if(!confirm('Gesamte Bestellung zuruecksetzen?')) return;
    state={};
  }
  save(); render();
}

function updateStats(){
  const allSelected = PRODUCTS.filter(p=>state[p.nr]);
  // Filter by active supplier for display totals
  const displayProducts = activeSupplier ? allSelected.filter(p=>p.supplier===activeSupplier) : allSelected;
  const totalNet = displayProducts.reduce((s,p)=>s+Math.round((parseFloat(p.price_net)||0)*(state[p.nr]?.qty||0)*100)/100,0);
  const totalGross = displayProducts.reduce((s,p)=>s+Math.round((parseFloat(p.price_gross)||0)*(state[p.nr]?.qty||0)*100)/100,0);
  document.getElementById('statTotal').textContent = activeSupplier ? PRODUCTS.filter(p=>p.supplier===activeSupplier).length : PRODUCTS.length;
  document.getElementById('statSelected').textContent = displayProducts.length;
  document.getElementById('statNet').textContent = totalNet.toFixed(2)+' EUR';
  document.getElementById('statGross').textContent = totalGross.toFixed(2)+' EUR';
  // Bottom panel always shows grand total across all suppliers
  const grandGross = allSelected.reduce((s,p)=>s+Math.round((parseFloat(p.price_gross)||0)*(state[p.nr]?.qty||0)*100)/100,0);
  document.getElementById('panelCount').textContent = allSelected.length;
  document.getElementById('panelTotal').textContent = grandGross.toFixed(2)+' EUR';
  document.getElementById('orderPanel').classList.toggle('visible', allSelected.length>0);
}

function save(){
  try{localStorage.setItem('spudz_order',JSON.stringify(state));}catch(e){}
  try{localStorage.setItem('spudz_ordered',JSON.stringify(orderedSuppliers));}catch(e){}
}

// Build WhatsApp-friendly order text for a supplier
function buildOrderText(supplier){
  const supProducts = PRODUCTS.filter(p=>p.supplier===supplier && state[p.nr]);
  if(!supProducts.length) return '';
  const today = new Date().toLocaleDateString('de-DE');
  let text = `*SPUDZ Bestellung — ${supplier}*\n`;
  text += `Lager: ${selectedLager}\n`;
  text += `Bestellt von: ${currentUser?currentUser.name:'Unbekannt'}\n`;
  text += `Datum: ${today}\n\n`;
  supProducts.forEach(p=>{
    const qty = state[p.nr].qty;
    text += `${qty}x  ${p.nr}  ${pName(p)} (${p.unit})\n`;
  });
  text += `\n${supProducts.length} Artikel`;
  return text;
}

// Place order: share text via Web Share API (mobile) or copy to clipboard (desktop)
function placeOrder(supplier){
  if(!requireLager()) return;
  const supProducts = PRODUCTS.filter(p=>p.supplier===supplier && state[p.nr]);
  if(!supProducts.length){alert('Keine Produkte ausgewaehlt!');return;}

  const text = buildOrderText(supplier);
  const today = new Date().toLocaleDateString('de-DE');

  // Try Web Share API first (works great on mobile)
  if(navigator.share){
    navigator.share({title:'Bestellung '+supplier, text:text}).then(()=>{
      finishOrder(supplier, today);
    }).catch(e=>{
      // User cancelled share — still copy to clipboard as fallback
      navigator.clipboard.writeText(text).then(()=>{
        finishOrder(supplier, today);
        showToast(`${supplier} — Bestellung kopiert!`);
      }).catch(()=>{ finishOrder(supplier, today); });
    });
  } else {
    // Desktop: copy to clipboard
    navigator.clipboard.writeText(text).then(()=>{
      finishOrder(supplier, today);
      showToast(`${supplier} — Bestellung in Zwischenablage kopiert! Jetzt an Seval senden.`);
    }).catch(()=>{
      const w=window.open('','_blank');
      w.document.write('<pre style="font-family:monospace;white-space:pre-wrap;padding:20px">'+text.replace(/\*/g,'')+'</pre>');
      finishOrder(supplier, today);
    });
  }
}

function finishOrder(supplier, today){
  PRODUCTS.filter(p=>p.supplier===supplier).forEach(p=>delete state[p.nr]);
  orderedSuppliers[supplier] = today + ', ' + new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  save();
  render();
}

// Generate PDF for a specific supplier (optional — via PDF button)
function downloadPDF(supplier){
  if(!requireLager()) return;
  const supProducts = PRODUCTS.filter(p=>p.supplier===supplier && state[p.nr]);
  if(!supProducts.length){alert('Keine Produkte ausgewaehlt!');return;}

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const today = new Date().toLocaleDateString('de-DE');
  const pageW = doc.internal.pageSize.getWidth();

  doc.setFillColor(26,58,122);
  doc.rect(0,0,pageW,38,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(22);
  doc.setFont('helvetica','bold');
  doc.text('SPUDZ',14,18);
  doc.setFontSize(10);
  doc.setFont('helvetica','normal');
  doc.text('Bestellliste — Lager: '+selectedLager,14,26);
  doc.setFontSize(14);
  doc.setFont('helvetica','bold');
  doc.text(supplier, pageW-14, 18, {align:'right'});
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.text('Datum: '+today, pageW-14, 26, {align:'right'});

  let totalNet=0, totalGross=0;
  const rows = supProducts.map((p,i)=>{
    const qty = state[p.nr].qty;
    const net = Math.round((parseFloat(p.price_net)||0)*qty*100)/100;
    const gross = Math.round((parseFloat(p.price_gross)||0)*qty*100)/100;
    totalNet+=net; totalGross+=gross;
    return [i+1, p.nr, pName(p), qty, p.unit, gross.toFixed(2)+' EUR'];
  });

  doc.autoTable({
    startY:44,
    head:[['#','Art.Nr','Produkt','Menge','Einheit','Gesamt (brutto)']],
    body:rows,
    theme:'grid',
    headStyles:{fillColor:[26,58,122],textColor:255,fontSize:8,fontStyle:'bold'},
    bodyStyles:{fontSize:8,cellPadding:2.5},
    columnStyles:{0:{halign:'center',cellWidth:8},1:{cellWidth:24,fontStyle:'bold'},2:{cellWidth:70},3:{halign:'center',cellWidth:14},4:{cellWidth:30},5:{halign:'right',cellWidth:28,fontStyle:'bold'}},
    alternateRowStyles:{fillColor:[245,246,250]},
    margin:{left:10,right:10}
  });

  const finalY = doc.lastAutoTable.finalY+6;
  doc.setFontSize(10);
  doc.setTextColor(26,58,122);
  doc.setFont('helvetica','bold');
  doc.text(`${supProducts.length} Artikel — Netto: ${totalNet.toFixed(2)} EUR / Brutto: ${totalGross.toFixed(2)} EUR`, 14, finalY);

  const safeName = supplier.replace(/[^a-zA-Z0-9]/g,'_');
  doc.save(`Bestellung_${safeName}_${today.replace(/\./g,'-')}.pdf`);
  showToast(`${supplier} — PDF heruntergeladen!`);
}

function undoOrder(supplier){
  delete orderedSuppliers[supplier];
  save(); render();
}

function reopenSupplier(supplier){
  delete orderedSuppliers[supplier];
  save(); render();
}

// Export all suppliers as one combined PDF
function exportAll(){
  if(!requireLager()) return;
  const selected = PRODUCTS.filter(p=>state[p.nr]);
  if(!selected.length){alert('Keine Produkte ausgewaehlt!');return;}

  const bySupplier = {};
  selected.forEach(p=>{
    if(!bySupplier[p.supplier])bySupplier[p.supplier]=[];
    bySupplier[p.supplier].push(p);
  });

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const today = new Date().toLocaleDateString('de-DE');
  const pageW = doc.internal.pageSize.getWidth();
  const suppliers = Object.keys(bySupplier).sort();
  let grandNet=0, grandGross=0;

  suppliers.forEach((sup, si)=>{
    if(si>0) doc.addPage();

    // Header
    doc.setFillColor(26,58,122);
    doc.rect(0,0,pageW,38,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(22);
    doc.setFont('helvetica','bold');
    doc.text('SPUDZ',14,18);
    doc.setFontSize(10);
    doc.setFont('helvetica','normal');
    doc.text('Gesamtbestellung — '+sup+' — Lager: '+selectedLager,14,26);
    doc.setFontSize(9);
    doc.text('Datum: '+today, pageW-14, 18, {align:'right'});
    doc.text((si+1)+' / '+suppliers.length+' Lieferanten', pageW-14, 26, {align:'right'});

    let supNet=0, supGross=0;
    const rows = bySupplier[sup].map((p,i)=>{
      const qty = state[p.nr].qty;
      const net = Math.round((parseFloat(p.price_net)||0)*qty*100)/100;
      const gross = Math.round((parseFloat(p.price_gross)||0)*qty*100)/100;
      supNet+=net; supGross+=gross;
      grandNet+=net; grandGross+=gross;
      return [i+1, p.nr, pName(p), qty, p.unit, gross.toFixed(2)+' EUR'];
    });

    doc.autoTable({
      startY:44,
      head:[['#','Art.Nr','Produkt','Menge','Einheit','Gesamt Netto']],
      body:rows,
      theme:'grid',
      headStyles:{fillColor:[26,58,122],textColor:255,fontSize:8,fontStyle:'bold'},
      bodyStyles:{fontSize:7.5,cellPadding:2},
      columnStyles:{0:{halign:'center',cellWidth:8},1:{cellWidth:22,fontSize:6.5},2:{cellWidth:60,fontStyle:'bold'},3:{halign:'center',cellWidth:14},4:{cellWidth:28,fontSize:6.5},5:{halign:'right',cellWidth:28,fontStyle:'bold'}},
      alternateRowStyles:{fillColor:[245,246,250]},
      margin:{left:10,right:10}
    });

    const fy = doc.lastAutoTable.finalY+5;
    doc.setFontSize(9);
    doc.setTextColor(26,58,122);
    doc.setFont('helvetica','bold');
    doc.text(`${sup}: ${bySupplier[sup].length} Artikel — Netto ${supNet.toFixed(2)} EUR / Brutto ${supGross.toFixed(2)} EUR`, 14, fy);
  });

  doc.save(`Bestellung_Gesamt_${today.replace(/\./g,'-')}.pdf`);
  showToast('Gesamt-PDF heruntergeladen!');
}

function printOrder(){
  document.getElementById('showMode').value='selected';
  render();
  setTimeout(()=>window.print(),300);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Reset all ordered-states for new day
function newDay(){
  if(!confirm('Neuer Tag: Alle Bestellungen und Mengen zuruecksetzen?')) return;
  state = {};
  orderedSuppliers = {};
  save();
  activeSupplier = '';
  render();
  showToast('Alles zurueckgesetzt — neuer Tag!');
}



// init() is called by activateApp() after login
</script>
</body>
</html>
